# Deploy both Vite apps to Firebase Hosting when pushing to main

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build the public-facing site
      - name: Install public-site dependencies
        run: npm ci
        working-directory: public-site

      - name: Build public-site
        run: npm run build
        working-directory: public-site

      # Build the admin studio (outputs to public-site/dist/admin/)
      - name: Install studio-site dependencies
        run: npm ci
        working-directory: studio-site

      - name: Build studio-site
        run: npm run build
        working-directory: studio-site

      # Deploy the combined dist/ to Firebase
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_RMCWEBSITE_1AD84 }}
          channelId: live
          projectId: rmcwebsite-1ad84
