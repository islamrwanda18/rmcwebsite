<!DOCTYPE html>
<html lang="en" id="html-root">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rwanda Muslim Community (RMC)</title>
    
    <!-- Favicon and Web Manifest Links -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="manifest" href="/site.webmanifest">

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Rwanda Muslim Community (RMC)">
    <meta property="og:description" content="Welcome to the official portal of the Rwanda Muslim Community. Discover our programs, stay updated with announcements, and connect with the leadership.">
    <meta property="og:image" content="/android-chrome-512x512.png">
    <meta property="og:type" content="website">

    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Social Media SDKs -->
    <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
    <script async src="//www.instagram.com/embed.js"></script>
    <div id="fb-root"></div>
    <script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_US/sdk.js#xfbml=1&version=v18.0" nonce="auto"></script>
  </head>
  <body class="bg-gray-50 text-rmc-black font-sans min-h-screen flex flex-col overflow-x-hidden">
    <!-- Google Translate Widget (hidden, triggered from Navbar) -->
    <div id="google_translate_element" style="display:none;"></div>
    <script>
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'en,rw,fr,sw,ar',
          autoDisplay: false,
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE
        }, 'google_translate_element');
      }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <style>
      /* Hide the default Google Translate bar */
      .goog-te-banner-frame, #goog-gt-tt, .goog-te-balloon-frame { display: none !important; }
      body { top: 0 !important; }
      .skiptranslate { display: none !important; }
      body { position: static !important; }
    </style>

    <div id="root" class="w-full flex flex-col flex-grow"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
